name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: "Welcome to OUR project, really excited to see what our collaboration can birth from this project"
        pr-message: "Hi! I hope you enjoy this project and contribute to it, eager to collaborate and learn from others in this journey"
